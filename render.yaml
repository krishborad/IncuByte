services:
  # ── Backend: Node.js Web Service ──
  - type: web
    name: car-dealership-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # set manually in Render Dashboard
      - key: JWT_SECRET
        generateValue: true # Render auto-generates a strong secret
      - key: FRONTEND_URL
        sync: false # set to your frontend URL after first deploy
    healthCheckPath: /api/health

  # ── Frontend: Static Site ──
  - type: web
    name: car-dealership-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false # set to your backend URL + /api after first deploy
